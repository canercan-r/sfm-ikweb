<div
  [id]="triggerId"
  data-st-menu-offset=",10"
  data-st-menu-trigger="click"
  data-st-menu-placement="right-start"
  data-st-menu-flip="bottom"
  (click)="countrySearchFocus()"
>
  <span
    class="input-group-text cursor-pointer bg-transparent border border-gray-300 z-index-1 py-4"
  >
    <img
      class="w-20px h-20px object-fit-cover rounded-pill"
      [src]="getCountryFlags(selectedCountry?.langCode)"
    />
  </span>
  <div
    data-st-menu="true"
    [id]="innerId"
    class="menu menu-sub menu-sub-dropdown menu-column menu-rounded menu-dark menu-state-bg rounded menu-state-primary fw-bold py-4 fs-6 w-250px w-md-300px"
  >
    <form class="w-100 position-relative px-5" autocomplete="off">
      <input
        type="text"
        name="countrySearch"
        id="countrySearch"
        #countrySearchInput
        (click)="countrySearchClick($event)"
        class="search-input form-control form-control-transparent form-control-flush"
        [placeholder]="'Global.Ara' | translate"
        [formControl]="countryForm"
      />
    </form>
    <div class="separator border-gray-200 mb-3 mx-3"></div>
    <div class="hover-scroll-overlay-y mh-200px me-3">
      <div
        *ngFor="
          let country of countries
            | searchBy : ['countryName', 'langCode'] : countryForm.value
        "
        class="menu-item px-3 cursor-pointer mb-2"
      >
        <div
          class="d-flex px-5 align-items-center gap-2"
          (click)="onCountryChange(country)"
        >
          <img
            class="w-20px h-20px object-fit-cover rounded-pill"
            [src]="getCountryFlags(country?.langCode)"
            [alt]="country?.countryName || 'Country flag'"
          />
          {{ country.countryName }}
        </div>
      </div>
    </div>
  </div>
</div>
