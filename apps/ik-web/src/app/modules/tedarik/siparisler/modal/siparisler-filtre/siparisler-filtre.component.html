<div class="card d-flex flex-column flex-fill h-100 shadow-none rounded-0 w-100 overflow-hidden">
  <div class="card-header border-0 align-items-center">
    <span class="fs-4 fw-bold">
      {{ "Global.Filtre" | translate }}
    </span>
    <button class="btn btn-sm btn-icon ms-auto" (click)="dismiss()">
      <i class="fa-solid fa-xmark fs-3"></i>
    </button>
  </div>
  <div class="card-body h-100 overflow-auto pt-0">
    <form [formGroup]="form" class="row row-gap-3">
      <section class="col-12">
        <ikweb-date-picker
          name="baslangicTarihi"
          label="Talepler.Siparisler.BaslangicTarihi"
          formControlName="baslangicTarihi"
        ></ikweb-date-picker>
      </section>

      <section class="col-12">
        <ikweb-date-picker
          name="bitisTarihi"
          label="Talepler.Siparisler.BitisTarihi"
          formControlName="bitisTarihi"
        ></ikweb-date-picker>
      </section>

      <section class="col-12">
        <ikweb-select
          name="proje"
          label="Talepler.Siparisler.Proje"
          formControlName="proje"
          [data]="[]"
          valueKey=""
          displayKey=""
        ></ikweb-select>
      </section>
    </form>
  </div>
  <div class="card-footer border-0">
    <div class="d-flex flex-stack">
      <button class="btn btn-sm btn-yellow" (click)="filtrele()">
        {{ "Global.Filtre" | translate }}
      </button>
      <button class="btn btn-sm btn-transparent" (click)="temizle()">
        {{ "Global.Temizle" | translate }}
      </button>
    </div>
  </div>
</div>
