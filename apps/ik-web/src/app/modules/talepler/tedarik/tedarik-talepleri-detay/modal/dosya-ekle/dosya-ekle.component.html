<div
  class="card d-flex flex-column flex-fill h-100 shadow-none rounded-0 w-100 overflow-hidden"
>
  <div class="card-header border-0 align-items-center">
    <span class="fs-4 fw-bold">
      {{ "Talepler.Tedarik.DosyaEkle" | translate }}
    </span>
    <button class="btn btn-sm btn-icon ms-auto" (click)="dismiss()">
      <i class="fa-solid fa-xmark fs-3"></i>
    </button>
  </div>

  <div class="card-body h-100 overflow-auto pt-0">
    <div [formGroup]="form" class="row row-gap-4">
      <section class="col-12">
        <ikweb-date-picker
          name="gecerlilikTarihi"
          label="Talepler.Tedarik.Form.GecerlilikTarihi"
          formControlName="gecerlilikTarihi"
        ></ikweb-date-picker>
      </section>

      <section class="col-12">
        <ikweb-select
          name="dosyaTuru"
          label="Talepler.Tedarik.Form.DosyaTuru"
          [data]="[]"
          valueKey=""
          displayKey=""
          formControlName="dosyaTuru"
        ></ikweb-select>
      </section>

      <section class="col-12">
        <ikweb-input
          name="dosyaLink"
          label="Talepler.Tedarik.Form.DosyaLink"
          formControlName="dosyaLink"
        ></ikweb-input>
      </section>
    </div>
  </div>

  <div class="card-footer border-0">
    <div class="d-flex flex-stack">
      <button class="btn btn-sm btn-success">
        {{ "Global.Ekle" | translate }}
      </button>
      <button class="btn btn-sm btn-transparent">
        {{ "Global.Temizle" | translate }}
      </button>
    </div>
  </div>
</div>
