<ng-container *ngIf="user$ | async as _user">
  <div class="menu-item px-3">
    <div class="menu-content d-flex align-items-center">
      <cv-symbol
        [label1]="_user.firstName"
        [label2]="_user.lastName"
        [size]="'50px'"
        class="me-5"
      >
      </cv-symbol>

      <div class="d-flex flex-column">
        <div class="fw-bolder d-flex align-items-center fs-5">
          {{ _user.firstName }} {{ _user.lastName }}
        </div>
        <span class="fw-bold text-muted fs-7">
          <!-- {{ _user.companyName }} -->
        </span>
      </div>
    </div>
  </div>

  <div class="separator my-2"></div>

  <div
    class="menu-item px-3"
    data-st-menu-trigger="{default: 'click', lg: 'hover'}"
    data-st-menu-placement="{default: 'bottom-end', lg: 'left-start'}"
    data-st-menu-flip="bottom"
  >
    <a class="menu-link px-5 cursor-pointer">
      <span class="menu-title position-relative">
        {{ "Global.Dil" | translate }}
        <span
          class="fs-8 rounded bg-light px-3 py-2 position-absolute translate-middle-y top-50 end-0"
        >
          {{ "Global." + currentLanguage | translate }}
          <img
            class="w-15px h-15px rounded-1 ms-2"
            [src]="'assets/flags/' + currentLanguage + '.svg'"
            alt="flags"
          />
        </span>
      </span>
    </a>

    <div class="menu-sub menu-sub-dropdown w-175px py-4">
      <div
        *ngFor="let language of languages"
        (click)="setLanguage(language)"
        class="menu-item px-3 cursor-pointer"
      >
        <a
          class="menu-link d-flex px-5"
          [ngClass]="currentLanguage === language ? 'active' : ''"
        >
          <span class="symbol symbol-20px me-4">
            <img
              class="rounded-1"
              [src]="'assets/flags/' + language + '.svg'"
              alt="flags"
            />
          </span>
          {{ "Global." + language | translate }}
        </a>
      </div>
    </div>
  </div>

  <div class="separator my-2"></div>

  <div class="menu-item px-3">
    <a (click)="logout()" class="menu-link px-5 cursor-pointer">
      {{ "Global.OturumuKapat" | translate }}
    </a>
  </div>
</ng-container>
