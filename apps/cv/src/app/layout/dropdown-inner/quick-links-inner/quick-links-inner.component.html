<div
  class="d-flex flex-column flex-center bgi-position-center bgi-no-repeat bgi-size-cover rounded-top px-9 py-10"
  [style.background-image]="'url(assets/misc/pattern-1.png)'"
>
  <h3 class="text-white fw-bold mb-3">Ürünler</h3>
  <span class="badge bg-primary py-2 px-3">4 adet ürün bulunuyor.</span>
</div>

<div class="row g-0">
  <div class="col-6">
    <a
      class="d-flex flex-column flex-center h-100 p-6 bg-hover-light border-end border-bottom cursor-pointer"
    >
      <i class="si-duotone si-wallet si-primary si-3x mb-2"
        ><span class="path1"></span><span class="path2"></span
      ></i>
      <span class="fs-5 fw-bold text-gray-800 text-center mb-0">FLYBY POS</span>
      <span class="fs-7 text-gray-400">Aktif</span>
    </a>
  </div>

  <div class="col-6">
    <a
      class="d-flex flex-column flex-center h-100 p-6 bg-hover-light border-bottom cursor-pointer"
    >
      <i class="si-duotone si-cheque si-primary si-3x mb-2">
        <span class="path1"></span>
        <span class="path2"></span>
        <span class="path3"></span>
        <span class="path4"></span>
        <span class="path5"></span>
        <span class="path6"></span>
        <span class="path7"></span>
      </i>
      <span class="fs-5 fw-bold text-gray-800 text-center mb-0"
        >FLYBY Ticketing</span
      >
      <span class="fs-7 text-gray-400">Aktif</span>
    </a>
  </div>

  <div class="col-6">
    <a
      class="d-flex flex-column flex-center h-100 p-6 bg-hover-light border-end cursor-pointer"
    >
      <i class="si-duotone si-abstract-47 si-primary si-3x mb-2"
        ><span class="path1"></span><span class="path2"></span
      ></i>
      <span class="fs-5 fw-bold text-gray-800 text-center mb-0"
        >FLYBY Tracker</span
      >
      <span class="fs-7 text-gray-400">Askıda</span>
    </a>
  </div>

  <div class="col-6">
    <a
      class="d-flex flex-column flex-center h-100 p-6 bg-hover-light cursor-pointer"
    >
      <i class="si-duotone si-phone si-primary si-3x mb-2"
        ><span class="path1"></span><span class="path2"></span
      ></i>
      <span class="fs-5 fw-bold text-gray-800 text-center mb-0"
        >FLYBY Mobile</span
      >
      <span class="fs-7 text-gray-400">Aktif</span>
    </a>
  </div>
</div>

<div class="py-2 text-center border-top">
  <a routerLink="/" class="btn btn-color-gray-600 btn-active-color-primary">
    Tümünü Görüntüle
    <i class="si-duotone si-arrow-right si-5"
      ><span class="path1"></span><span class="path2"></span
    ></i>
  </a>
</div>
