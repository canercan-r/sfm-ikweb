<div class="d-flex flex-column flex-root">
  <div class="bg-white d-flex flex-column flex-lg-row flex-column-fluid">
    <div
      class="d-flex d-lg-none flex-lg-row-fluid order-1 order-lg-2 bg-primary"
    >
      <h1
        class="d-flex text-white fw-bold fs-2x flex-column justify-content-center my-0 pt-5 pb-15 px-10 w-100"
      >
        {{ "Msg.ApplicationRTitle" | translate }}
      </h1>
    </div>
    <div
      class="d-flex flex-column flex-column-fluid flex-start flex-lg-center w-lg-25 p-md-10 z-index-lg-3 order-2 order-lg-0 rounded-6 rounded-bottom-0 mt-n10 bg-body"
    >
      <div class="container-fluid">
        <div class="card card-flush bg-transparent">
          <div class="card-header d-none d-lg-flex flex-lg-row-fluid bg-body">
            <span
              class="d-flex text-dark fw-bold fs-2x flex-column justify-content-center my-0 pt-5 pb-15 px-10 w-100"
            >
              {{ "Msg.ApplicationRTitle" | translate }}
            </span>
          </div>
          <div class="card-body">
            <span class="text-dark fw-semibold fs-6 pt-3">{{
              "Msg.ApplicationRecieved" | translate
            }}</span>
          </div>
        </div>
      </div>
    </div>
    <div
      class="d-flex flex-lg-row-fluid w-lg-50 bgi-no-repeat bgi-size-contain bgi-position-x-end order-1 order-lg-2"
      [style.background-image]="'url(' + rigthPanel + ')'"
      *ngIf="sharedService.rigthPanel$ | async as rigthPanel"
    ></div>
  </div>
</div>
