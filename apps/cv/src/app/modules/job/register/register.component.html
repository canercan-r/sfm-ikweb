<div class="d-flex flex-column flex-root">
  <div class="d-flex flex-column flex-lg-row flex-column-fluid bg-white">
    <div
      class="d-flex d-lg-none flex-lg-row-fluid order-1 order-lg-2 bg-primary"
    >
      <h1
        class="d-flex text-inverse-primary fw-bold fs-2x flex-column justify-content-center my-0 pt-5 pb-15 px-10 w-100"
      >
        {{ "Job.Register.Hello" | translate }},
        <span class="text-inverse-primary-200 fw-semibold fs-6 pt-3">{{
          "Job.Register.HelloDes" | translate
        }}</span>
      </h1>
      <cv-topbar></cv-topbar>
    </div>

    <div
      class="d-flex flex-column flex-column-fluid flex-start flex-lg-center w-lg-25 p-md-10 z-index-lg-3 order-2 order-lg-0 rounded-6 rounded-bottom-0 mt-n10 bg-body"
    >
      <div class="d-none d-lg-flex flex-end w-100">
        <cv-topbar></cv-topbar>
      </div>
      <div class="card card-flush bg-transparent">
        <div
          class="card-header d-flex justify-content-center"
          *ngIf="sharedService.logo$ | async as _logo"
        >
          <cv-symbol
            [type]="'img'"
            [imgalt]="'illustrations-1'"
            [imgclass]="'object-fit-contain'"
            [img]="_logo"
            [size]="'300px'"
          ></cv-symbol>
        </div>

        <div class="card-body">
          <form
            [formGroup]="registerForm"
            novalidate="novalidate"
            id="st_registerForm_form"
            (ngSubmit)="nextPage()"
            class="row gx-10 gy-6"
          >
            <div class="col-12">
              <cv-input
                type="text"
                label="Job.Register.Ad"
                formControlName="ad"
              >
              </cv-input>
            </div>
            <div class="col-12">
              <cv-input
                type="text"
                label="Job.Register.Soyad"
                formControlName="soyad"
              >
              </cv-input>
            </div>
            <div class="col-12">
              <cv-input
                maxlength="11"
                minlength="9"
                type="number"
                label="Job.Register.ID"
                formControlName="idNo"
              >
              </cv-input>
            </div>
            <div class="col-12">
              <cv-input
                type="tel"
                label="Job.Register.Telefon"
                formControlName="telefon"
              >
              </cv-input>
            </div>
            <div class="col-12">
              <cv-select
                name="mekan"
                valueKey="mekanID"
                displayKey="mekanAdi"
                [data]="mekanlar$ | async"
                label="Job.Register.BolgeOtel"
                formControlName="mekanID"
                (changed)="mekanChanged($event)"
              ></cv-select>

              <!-- <igx-input-group
                  class="autocomplete igx-input-group igx-input-group--border igx-input-group--filled"
                >
                  <label igxLabel class="required" for="mekan">{{
                    "Job.Register.BolgeOtel" | translate
                  }}</label>
                  <input
                    igxInput
                    name="mekan"
                    type="text"
                    [igxAutocomplete]="mekanPanel"
                    [ngModelOptions]="{ standalone: true }"
                    [(ngModel)]="mekanSelected"
                  />
                </igx-input-group>
                <igx-drop-down
                  #mekanPanel
                  maxHeight="300px"

                >
                  <igx-drop-down-item
                    *igxFor="
                      let mekan of mekanlar$
                        | async
                        | mekansWith : mekanSelected;
                      scrollOrientation: 'vertical';

                    [id]="mekan.mekanID"
                  >
                    {{ mekan.mekanAdi }}
                  </igx-drop-down-item>
                </igx-drop-down> -->
            </div>
            <div class="col-12">
              <cv-select
                name="departman"
                valueKey="departmanID"
                displayKey="departmanAdi"
                [data]="departmanlar"
                label="Job.Register.Departman"
                formControlName="departmanID"
                (changed)="departmanChanged($event)"
              ></cv-select>
            </div>
            <div class="col-12">
              <cv-select
                name="gorevTanim"
                valueKey="gorevTanimID"
                displayKey="gorevTanimAdi"
                [data]="gorevTanimlari"
                label="Job.Register.GorevTanimi"
                formControlName="gorevTanimID"
              ></cv-select>
            </div>
            <div class="col-12">
              <cv-radio
                valueKey="value"
                displayKey="name"
                [data]="calismaTercihiArr"
                formControlName="calismaTercihi"
              ></cv-radio>
            </div>

            <div class="col-12">
              <div class="d-grid gap-5">
                <button
                  (click)="nextPage()"
                  class="btn btn-primary w-100 w-sm-auto"
                  type="submit"
                  [disabled]="registerForm.invalid"
                >
                  {{ "Global.DevamEt" | translate }}
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
    <div
      class="d-flex flex-lg-row-fluid w-lg-50 bgi-no-repeat bgi-size-contain bgi-position-x-end order-1 order-lg-2"
      [style.background-image]="'url(' + rigthPanel + ')'"
      *ngIf="sharedService.rigthPanel$ | async as rigthPanel"
    ></div>
  </div>
</div>
