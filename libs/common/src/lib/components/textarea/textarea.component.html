<igx-input-group>
  <label igxLabel [for]="name">{{ label | translate }}</label>
  <textarea
    #textarea
    igxInput
    type="text"
    [formControl]="control"
    [name]="name"
    [maxlength]="maxlength"
    [readonly]="readonly"
    [rows]="rows"
  ></textarea>
  <igx-hint position="end"
    >{{ textarea.value.length }}/{{ maxlength }}</igx-hint
  >
</igx-input-group>
