<div class="modal-header">
  <h2>{{ "Global.FotografiniCek" | translate }}</h2>
  <button class="btn btn-sm btn-icon explore-btn-dismiss" (click)="dismiss()">
    <i class="fa-solid fa-xmark fs-3"></i>
  </button>
</div>
<div class="modal-body">
  <video id="video" width="100%" autoplay></video>
  <canvas id="canvas-for-photo" width="250" height="200" style="zoom: 35%"></canvas>
</div>
<div class="modal-footer d-flex justify-content-center gap-5">
  <button type="button" class="btn btn-dark" (click)="take()" [disabled]="!camIsReady">
    {{ "Global.Cek" | translate }}
  </button>
  <button type="button" class="btn btn-primary" (click)="apply()" [disabled]="webCamMode !== CAMERA_MODE.PHOTO">
    {{ "Global.Uygula" | translate }}
  </button>
</div>
